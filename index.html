<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ribeiro Rinaldi Advocacia — Hub Executivo</title>
  <meta http-equiv="refresh" content="0;url=Cronograma%20de%20Posts/index.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;600;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #150F0B;
      --panel-dark: #1E1611;
      --card-dark: #281F18;
      --orange: #FF5E1A;
      --magenta: #F0247C;
      --creme: #F7F1E8;
      --text-muted: #A89F91;
      --gradient-brand: linear-gradient(135deg, #FF5E1A 0%, #F0247C 100%);
      --border-color: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      color: var(--creme);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .hub-card {
      background: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .logo {
      width: 60px;
      height: 60px;
      background: var(--gradient-brand);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.8rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .hub-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      color: var(--creme);
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    .hub-link:hover {
      border-color: var(--orange);
      background: rgba(255, 94, 26, 0.12);
      transform: translateY(-2px);
    }
    .hub-link .badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      background: rgba(255, 94, 26, 0.2);
      color: #FFA37B;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
    }
  </style>
  <script>
    window.location.href = "Cronograma%20de%20Posts/index.html";
  </script>
</head>
<body>
  <div class="hub-card">
    <div class="logo">RR</div>
    <h1>Ribeiro Rinaldi Advocacia</h1>
    <p>Redirecionando para o Cronograma Executivo de Conteúdo...</p>

    <div class="links-grid">
      <a href="Cronograma%20de%20Posts/index.html" class="hub-link">
        <span>🗓️ Cronograma de Posts 360º</span>
        <span class="badge">Acessar</span>
      </a>
      <a href="LANDINGPAGE/index.html" class="hub-link">
        <span>🚀 Landing Page Oficial</span>
        <span class="badge">Acessar</span>
      </a>
      <a href="midias-graficas/index.html" class="hub-link">
        <span>🎨 Mídias Gráficas & Social</span>
        <span class="badge">Acessar</span>
      </a>
      <a href="Documentos%20e%20Prompts/Ribeiro%20Rinaldi%20-%20Design%20System.md" class="hub-link">
        <span>📑 Design System & Guia de Prompts</span>
        <span class="badge">Docs</span>
      </a>
    </div>
  </div>
</body>
</html>
