<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E1A" />
      <stop offset="100%" stop-color="#F0247C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&amp;family=Manrope:wght@600;800&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #150F0B; }
      .tag { font-family: 'Space Mono', monospace; font-size: 26px; fill: #FF5E1A; letter-spacing: 4px; }
      .title { font-family: 'Archivo', sans-serif; font-size: 64px; font-weight: 900; fill: #F7F1E8; text-transform: uppercase; }
      .btn1-text { font-family: 'Manrope', sans-serif; font-size: 34px; font-weight: 600; fill: #F7F1E8; }
      .btn2-text { font-family: 'Manrope', sans-serif; font-size: 36px; font-weight: 800; fill: #160D09; }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #F7F1E8; }
      .slide-num { font-family: 'Space Mono', monospace; font-size: 24px; fill: #A79C90; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" class="bg" />
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="none" stroke="#3A2E24" stroke-width="2" />

  <text x="140" y="200" class="tag">ENQUETE • DIREITO DO CANDIDATO</text>

  <text x="140" y="380" class="title">A BANCA NEGOU</text>
  <text x="140" y="460" class="title">ACESSO AO SEU</text>
  <text x="140" y="540" class="title">LAUDO COMPLETO?</text>

  <!-- Option 1 -->
  <rect x="140" y="680" width="800" height="130" rx="65" fill="#1E1712" stroke="#3A2E24" stroke-width="2" />
  <text x="190" y="755" class="btn1-text">Sim, responderam de forma genérica 😡</text>

  <!-- Option 2 -->
  <rect x="140" y="850" width="800" height="140" rx="70" fill="url(#grad)" />
  <text x="190" y="933" class="btn2-text">Quero analisar meu laudo e recorrer</text>

  <!-- Footer -->
  <polyline points="140,1190 160,1210 200,1160" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="225" y="1198" class="brand">RIBEIRO RINALDI</text>
  <text x="830" y="1198" class="slide-num">05 / 06 →</text>
</svg>
