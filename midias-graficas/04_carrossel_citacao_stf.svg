<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E1A" />
      <stop offset="100%" stop-color="#F0247C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&amp;family=Manrope:wght@700&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #28201A; }
      .quote-mark { font-family: 'Archivo', sans-serif; font-size: 180px; font-weight: 900; fill: #FF5E1A; }
      .quote-text { font-family: 'Archivo', sans-serif; font-size: 54px; font-weight: 800; fill: #F7F1E8; }
      .author { font-family: 'Manrope', sans-serif; font-size: 32px; font-weight: 700; fill: #F7F1E8; }
      .author-sub { font-family: 'Space Mono', monospace; font-size: 24px; fill: #A79C90; text-transform: uppercase; }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #F7F1E8; }
      .slide-num { font-family: 'Space Mono', monospace; font-size: 24px; fill: #A79C90; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" class="bg" />
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="none" stroke="#3A2E24" stroke-width="2" />

  <text x="140" y="320" class="quote-mark">“</text>

  <text x="140" y="440" class="quote-text">SÓ POR LEI SE PODE</text>
  <text x="140" y="520" class="quote-text">SUJEITAR A EXAME</text>
  <text x="140" y="600" class="quote-text">PSICOTÉCNICO A</text>
  <text x="140" y="680" class="quote-text">HABILITAÇÃO DE</text>
  <text x="140" y="760" class="quote-text">CANDIDATO A CARGO</text>
  <text x="140" y="840" class="quote-text">PÚBLICO.</text>

  <!-- Author Block -->
  <circle cx="170" cy="1000" r="32" fill="#150F0B" stroke="#FF5E1A" stroke-width="4" />
  <text x="230" y="990" class="author">[ SUPREMO TRIBUNAL FEDERAL ]</text>
  <text x="230" y="1030" class="author-sub">Súmula Vinculante nº 44</text>

  <!-- Footer -->
  <polyline points="140,1190 160,1210 200,1160" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="225" y="1198" class="brand">RIBEIRO RINALDI</text>
  <text x="830" y="1198" class="slide-num">04 / 06 →</text>
</svg>
