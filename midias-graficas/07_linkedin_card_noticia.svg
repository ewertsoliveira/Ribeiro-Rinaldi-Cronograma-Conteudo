<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E1A" />
      <stop offset="100%" stop-color="#F0247C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&amp;family=Manrope:wght@600;700&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #150F0B; }
      .tag { font-family: 'Space Mono', monospace; font-size: 26px; fill: #FF5E1A; letter-spacing: 3px; }
      .title { font-family: 'Archivo', sans-serif; font-size: 58px; font-weight: 900; fill: #F7F1E8; text-transform: uppercase; }
      .quote-text { font-family: 'Manrope', sans-serif; font-size: 34px; font-weight: 600; fill: #F7F1E8; }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #F7F1E8; }
      .brand-sub { font-family: 'Space Mono', monospace; font-size: 20px; fill: #A79C90; letter-spacing: 1px; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" class="bg" />
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="#1E1712" stroke="#3A2E24" stroke-width="2" />

  <!-- Top Editoria Tag -->
  <text x="140" y="190" class="tag">[ JURISPRUDÊNCIA EM FOCO • DIREITO PÚBLICO ]</text>

  <!-- Headline -->
  <text x="140" y="320" class="title">STF E STJ REAFIRMAM:</text>
  <text x="140" y="395" class="title">ELIMINAÇÃO EM EXAME</text>
  <text x="140" y="470" class="title">PSICOTÉCNICO SEM</text>
  <text x="140" y="545" class="title">OBJETIVIDADE CIENTÍFICA</text>
  <text x="140" y="620" class="title">É NULA DE PLENO DIREITO</text>

  <!-- Quote Recorte Box -->
  <rect x="140" y="700" width="800" height="340" rx="24" fill="#150F0B" />
  <rect x="140" y="700" width="14" height="340" rx="7" fill="url(#grad)" />
  
  <text x="190" y="790" class="quote-text">“A discricionariedade administrativa</text>
  <text x="190" y="850" class="quote-text">não confere à banca examinadora</text>
  <text x="190" y="910" class="quote-text">o poder de arbitrar perfis sigilosos.</text>
  <text x="190" y="970" class="quote-text">Aplicação da Súmula Vinculante 44.”</text>

  <!-- Footer -->
  <polyline points="140,1190 160,1210 200,1160" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="225" y="1198" class="brand">RIBEIRO RINALDI</text>
  <text x="890" y="1198" class="brand-sub" text-anchor="end">ADVOCACIA PÚBLICA • SÚMULA 44 STF</text>
</svg>
