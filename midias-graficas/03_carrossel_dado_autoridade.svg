<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&amp;family=Manrope:wght@600;800&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #F7F1E8; }
      .tag { font-family: 'Space Mono', monospace; font-size: 28px; fill: #C04A12; letter-spacing: 4px; font-weight: 700; }
      .number { font-family: 'Archivo', sans-serif; font-size: 190px; font-weight: 900; fill: #FF5E1A; }
      .text-bold { font-family: 'Manrope', sans-serif; font-size: 44px; font-weight: 800; fill: #17110D; }
      .text { font-family: 'Manrope', sans-serif; font-size: 44px; font-weight: 600; fill: #2A241F; }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #17110D; }
      .slide-num { font-family: 'Space Mono', monospace; font-size: 24px; fill: #7A7065; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" class="bg" />
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="none" stroke="#D8CFC4" stroke-width="2" />

  <text x="140" y="200" class="tag">CRITÉRIO OBRIGATÓRIO</text>

  <text x="130" y="520" class="number">100%</text>

  <text x="140" y="660" class="text-bold">OBJETIVO E CIENTÍFICO.</text>
  <text x="140" y="740" class="text">O edital é obrigado a detalhar</text>
  <text x="140" y="820" class="text">os critérios psicométricos.</text>
  <text x="140" y="900" class="text">Avaliações vagas violam a lei</text>
  <text x="140" y="980" class="text">e podem ser anuladas.</text>

  <!-- Footer -->
  <polyline points="140,1190 160,1210 200,1160" fill="none" stroke="#FF5E1A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="225" y="1198" class="brand">RIBEIRO RINALDI</text>
  <text x="830" y="1198" class="slide-num">03 / 06 →</text>
</svg>
