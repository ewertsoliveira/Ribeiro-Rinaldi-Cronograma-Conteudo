<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E1A" />
      <stop offset="100%" stop-color="#F0247C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #150F0B; }
      .tag { font-family: 'Space Mono', monospace; font-size: 28px; fill: #FF5E1A; letter-spacing: 4px; font-weight: 700; }
      .title { font-family: 'Archivo', sans-serif; font-size: 82px; font-weight: 900; fill: #F7F1E8; text-transform: uppercase; }
      .sub { font-family: 'Archivo', sans-serif; font-size: 34px; font-weight: 800; fill: url(#grad); }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #F7F1E8; letter-spacing: 1px; }
      .slide-num { font-family: 'Space Mono', monospace; font-size: 24px; fill: #A79C90; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1350" class="bg" />
  
  <!-- Watermark Check -->
  <polyline points="300,950 500,1150 980,500" fill="none" stroke="#1E1712" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Content Box -->
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="none" stroke="#3A2E24" stroke-width="2" />

  <!-- Top Tag -->
  <text x="140" y="200" class="tag">RECURSO DE PROVA • SÚMULA 44</text>

  <!-- Main Headline -->
  <text x="140" y="440" class="title">REPROVADO NO</text>
  <text x="140" y="540" class="title">PSICOTÉCNICO</text>
  <text x="140" y="640" class="title">DO CONCURSO?</text>

  <text x="140" y="780" class="sub">3 CRITÉRIOS QUE A BANCA É</text>
  <text x="140" y="830" class="sub">OBRIGADA A SEGUIR POR LEI</text>

