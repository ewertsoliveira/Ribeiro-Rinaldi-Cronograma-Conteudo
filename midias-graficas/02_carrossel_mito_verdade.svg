<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E1A" />
      <stop offset="100%" stop-color="#F0247C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&amp;family=Manrope:wght@600;800&amp;family=Space+Mono:wght@700&amp;display=swap');
      .bg { fill: #150F0B; }
      .tag { font-family: 'Space Mono', monospace; font-size: 26px; fill: #FF5E1A; letter-spacing: 4px; }
      .mito-tag { font-family: 'Space Mono', monospace; font-size: 26px; fill: #F0247C; letter-spacing: 3px; }
      .verdade-tag { font-family: 'Space Mono', monospace; font-size: 26px; fill: #160D09; letter-spacing: 3px; }
      .mito-text { font-family: 'Manrope', sans-serif; font-size: 38px; font-weight: 600; fill: #A79C90; }
      .verdade-text { font-family: 'Manrope', sans-serif; font-size: 42px; font-weight: 800; fill: #160D09; }
      .brand { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 900; fill: #F7F1E8; }
      .slide-num { font-family: 'Space Mono', monospace; font-size: 24px; fill: #A79C90; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" class="bg" />
  <rect x="80" y="80" width="920" height="1190" rx="36" fill="none" stroke="#3A2E24" stroke-width="2" />

  <text x="140" y="190" class="tag">MITO VS. VERDADE • DIREITO PÚBLICO</text>

  <!-- Box Mito -->
  <rect x="140" y="260" width="800" height="380" rx="24" fill="#1E1712" stroke="#3A2E24" stroke-width="2" />
  <text x="190" y="340" class="mito-tag">✕ MITO</text>
  <text x="190" y="440" class="mito-text">"A avaliação psicológica da banca</text>
  <text x="190" y="500" class="mito-text">é soberana e não cabe recurso</text>
  <text x="190" y="560" class="mito-text">na Justiça."</text>

  <!-- Box Verdade -->
  <rect x="140" y="680" width="800" height="410" rx="24" fill="url(#grad)" />
  <text x="190" y="760" class="verdade-tag">✓ VERDADE</text>
  <text x="190" y="860" class="verdade-text">Critérios secretos ou subjetivos</text>
  <text x="190" y="930" class="verdade-text">são ilegais. A Justiça anula</text>
  <text x="190" y="1000" class="verdade-text">eliminações abusivas.</text>

  <!-- Footer -->
  <polyline points="140,1190 160,1210 200,1160" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="225" y="1198" class="brand">RIBEIRO RINALDI</text>
  <text x="830" y="1198" class="slide-num">02 / 06 →</text>
</svg>
