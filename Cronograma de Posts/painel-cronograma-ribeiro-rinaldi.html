<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ribeiro Rinaldi — Painel Executivo & Cronograma 360º de Conteúdo</title>
  <!-- Google Fonts: Archivo Black, Manrope, Space Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #150F0B;
      --panel-dark: #1E1611;
      --card-dark: #281F18;
      --card-hover: #342920;
      --orange: #FF5E1A;
      --orange-glow: rgba(255, 94, 26, 0.4);
      --magenta: #F0247C;
      --amber: #FFB347;
      --creme: #F7F1E8;
      --text-muted: #A89F91;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-orange: rgba(255, 94, 26, 0.3);
      --gradient-brand: linear-gradient(135deg, #FF5E1A 0%, #F0247C 100%);
      --gradient-card: linear-gradient(145deg, #221A14 0%, #19120D 100%);
      --shadow-lg: 0 12px 36px rgba(0,0,0,0.6);
      --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--creme);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: #3E3228;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--orange);
    }

    /* Top Banner / Header */
    header {
      background: var(--panel-dark);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      padding: 1.25rem 2rem;
    }

    .header-container {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .brand-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      background: var(--gradient-brand);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.35rem;
      color: #fff;
      box-shadow: 0 4px 15px var(--orange-glow);
    }

    .brand-titles h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .brand-titles p {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Main Tab Navigation */
    .tab-switcher {
      display: flex;
      background: #140F0C;
      padding: 0.35rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      gap: 0.5rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition);
    }

    .tab-btn:hover {
      color: var(--creme);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      background: var(--gradient-brand);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 94, 26, 0.35);
    }

    .executive-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      background: rgba(255, 94, 26, 0.15);
      color: var(--amber);
      border: 1px solid var(--border-orange);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Main Content Area */
    main {
      max-width: 1440px;
      margin: 2rem auto;
      padding: 0 2rem 4rem 2rem;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.35s ease forwards;
    }

    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
       VIEW 1: GOOGLE CALENDAR STYLE GRID
       ========================================= */
    .calendar-header-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      background: var(--panel-dark);
      padding: 1.25rem 1.5rem;
      border-radius: 14px;
      border: 1px solid var(--border-color);
    }

    .calendar-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .calendar-title h2 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.6rem;
      text-transform: uppercase;
    }

    .month-selector {
      display: flex;
      gap: 0.5rem;
    }

    .month-btn {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      color: var(--creme);
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .month-btn:hover, .month-btn.active {
      border-color: var(--orange);
      background: rgba(255, 94, 26, 0.15);
      color: #fff;
    }

    .legend-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.insta { background: var(--orange); }
    .legend-dot.yt { background: var(--magenta); }
    .legend-dot.linkedin { background: #3B82F6; }
    .legend-dot.blog { background: #10B981; }

    .calendar-grid-container {
      background: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #140F0C;
      border-bottom: 1px solid var(--border-color);
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--amber);
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.8rem 0;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(130px, auto);
      gap: 1px;
      background: var(--border-color);
    }

    .day-cell {
      background: var(--panel-dark);
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      transition: var(--transition);
      position: relative;
    }

    .day-cell:hover {
      background: #241A13;
    }

    .day-cell.other-month {
      background: #16100C;
      opacity: 0.4;
    }

    .day-cell.today {
      background: rgba(255, 94, 26, 0.08);
      border: 1px solid var(--orange);
    }

    .day-number {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      align-self: flex-end;
      margin-bottom: 0.2rem;
    }

    .day-cell.today .day-number {
      background: var(--orange);
      color: #fff;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    /* Calendar Event Pills */
    .event-pill {
      font-size: 0.76rem;
      font-weight: 700;
      padding: 0.35rem 0.55rem;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: var(--transition);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      border: 1px solid transparent;
    }

    .event-pill:hover {
      transform: translateY(-2px);
      filter: brightness(1.2);
    }

    .event-pill.insta {
      background: rgba(255, 94, 26, 0.2);
      color: #FFA37B;
      border-color: rgba(255, 94, 26, 0.4);
    }

    .event-pill.yt {
      background: rgba(240, 36, 124, 0.2);
      color: #FF85B8;
      border-color: rgba(240, 36, 124, 0.4);
    }

    .event-pill.linkedin {
      background: rgba(59, 130, 246, 0.2);
      color: #93C5FD;
      border-color: rgba(59, 130, 246, 0.4);
    }

    .event-pill.blog {
      background: rgba(16, 185, 129, 0.2);
      color: #6EE7B7;
      border-color: rgba(16, 185, 129, 0.4);
    }

    /* =========================================
       VIEW 2: ACCORDION & SCRIPTS VIEW
       ========================================= */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      background: var(--panel-dark);
      padding: 1rem 1.5rem;
      border-radius: 14px;
      border: 1px solid var(--border-color);
    }

    .week-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .week-btn {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-family: 'Manrope', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .week-btn:hover, .week-btn.active {
      background: var(--gradient-brand);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(255, 94, 26, 0.3);
    }

    .channel-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .channel-btn {
      background: #140F0C;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
    }

    .channel-btn:hover, .channel-btn.active {
      border-color: var(--amber);
      color: var(--creme);
      background: rgba(255, 179, 71, 0.12);
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 250px;
      max-width: 350px;
    }

    .search-box input {
      width: 100%;
      background: #140F0C;
      border: 1px solid var(--border-color);
      color: var(--creme);
      font-family: 'Manrope', sans-serif;
      font-size: 0.88rem;
      padding: 0.55rem 1rem 0.55rem 2.4rem;
      border-radius: 8px;
      transition: var(--transition);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 10px rgba(255, 94, 26, 0.2);
    }

    .search-box span {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* Accordion List Container */
    .accordion-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .accordion-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
      transition: var(--transition);
    }

    .accordion-card:hover {
      border-color: rgba(255, 94, 26, 0.35);
    }

    .accordion-card.open {
      border-color: var(--orange);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .accordion-header {
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      cursor: pointer;
      user-select: none;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-meta-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .platform-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .platform-badge.insta { background: rgba(255, 94, 26, 0.18); color: #FFA37B; border: 1px solid rgba(255, 94, 26, 0.4); }
    .platform-badge.yt { background: rgba(240, 36, 124, 0.18); color: #FF85B8; border: 1px solid rgba(240, 36, 124, 0.4); }
    .platform-badge.linkedin { background: rgba(59, 130, 246, 0.18); color: #93C5FD; border: 1px solid rgba(59, 130, 246, 0.4); }
    .platform-badge.blog { background: rgba(16, 185, 129, 0.18); color: #6EE7B7; border: 1px solid rgba(16, 185, 129, 0.4); }

    .card-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--amber);
      font-weight: 700;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--creme);
      margin-top: 0.2rem;
    }

    .card-meta-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color);
      color: var(--creme);
      font-family: 'Manrope', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.5rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
    }

    .copy-btn:hover {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
    }

    .toggle-icon {
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: transform 0.3s ease;
    }

    .accordion-card.open .toggle-icon {
      transform: rotate(180deg);
      color: var(--orange);
    }

    /* Accordion Body / Script details */
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      border-top: 1px solid transparent;
      background: #140F0C;
    }

    .accordion-card.open .accordion-body {
      max-height: 3500px;
      border-top-color: var(--border-color);
      padding: 1.8rem 2rem;
    }

    .script-section {
      margin-bottom: 1.5rem;
    }

    .script-section:last-child {
      margin-bottom: 0;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .script-text {
      background: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.2rem 1.4rem;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--creme);
      white-space: pre-wrap;
    }

    .highlight-box {
      background: rgba(255, 94, 26, 0.08);
      border-left: 4px solid var(--orange);
      padding: 1rem 1.25rem;
      border-radius: 0 8px 8px 0;
      margin-top: 0.8rem;
      font-size: 0.92rem;
    }

    /* Side Drawer / Modal for Quick Reading from Calendar */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-content {
      width: 100%;
      max-width: 650px;
      background: var(--panel-dark);
      border-left: 1px solid var(--border-color);
      height: 100%;
      overflow-y: auto;
      padding: 2rem;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 40px rgba(0,0,0,0.8);
    }

    .drawer-overlay.open .drawer-content {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .close-drawer-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: var(--creme);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .close-drawer-btn:hover {
      background: var(--magenta);
      color: #fff;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .header-container {
        flex-direction: column;
        align-items: flex-start;
      }
      .weekday-header, .days-grid {
        grid-template-columns: repeat(7, minmax(60px, 1fr));
      }
      .day-cell {
        padding: 0.35rem;
        min-height: 90px;
      }
      .event-pill {
        font-size: 0.68rem;
        padding: 0.2rem 0.35rem;
      }
      .accordion-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .card-meta-right {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <!-- Top Executive Header -->
  <header>
    <div class="header-container">
      <div class="brand-area">
        <div class="brand-logo">RR</div>
        <div class="brand-titles">
          <h1>Ribeiro Rinaldi Advocacia</h1>
          <p>Plano Executivo 360º — Julho & Agosto 2026 (Tom 80/100 de igual pra igual)</p>
        </div>
      </div>

      <!-- Tab Switchers -->
      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('calendar-view', this)">
          <span>🗓️</span> Visão de Calendário (Estilo Google)
        </button>
        <button class="tab-btn" onclick="switchTab('accordion-view', this)">
          <span>📑</span> Roteiros & Conteúdos (Sanfona Interativa)
        </button>
      </div>

      <div class="executive-tag">
        ⭐ Aprovação Dr. Paulo Rinaldi
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main>
    <!-- =========================================
         TAB 1: GOOGLE CALENDAR STYLE VIEW
         ========================================= -->
    <section id="calendar-view" class="view-section active">
      <div class="calendar-header-controls">
        <div class="calendar-title">
          <h2 id="current-month-label">Julho 2026</h2>
          <div class="month-selector">
            <button class="month-btn active" id="btn-julho" onclick="changeMonth('julho')">Julho 2026</button>
            <button class="month-btn" id="btn-agosto" onclick="changeMonth('agosto')">Agosto 2026</button>
          </div>
        </div>

        <div class="legend-bar">
          <div class="legend-item"><span class="legend-dot insta"></span> Instagram (Reels / Carrossel / Post)</div>
          <div class="legend-item"><span class="legend-dot yt"></span> YouTube Longo (Pilar)</div>
          <div class="legend-item"><span class="legend-dot linkedin"></span> LinkedIn Artigo / Post</div>
          <div class="legend-item"><span class="legend-dot blog"></span> Blog SEO (Artigo Raiz)</div>
        </div>
      </div>

      <!-- Calendar Grid -->
      <div class="calendar-grid-container">
        <div class="weekday-header">
          <div>Dom</div>
          <div>Seg</div>
          <div>Ter</div>
          <div>Qua</div>
          <div>Qui</div>
          <div>Sex</div>
          <div>Sáb</div>
        </div>
        <div class="days-grid" id="calendar-grid-cells">
          <!-- Populated dynamically via JS -->
        </div>
      </div>
    </section>

    <!-- =========================================
         TAB 2: ACCORDION & SCRIPTS VIEW
         ========================================= -->
    <section id="accordion-view" class="view-section">
      <!-- Filter and Search Bar -->
      <div class="filter-bar">
        <div class="week-filters" id="week-filter-buttons">
          <button class="week-btn active" onclick="filterByWeek('all', this)">⚡ Todas (39 Peças)</button>
          <button class="week-btn" onclick="filterByWeek('Semana 0', this)">📌 Fixos de Largada (3)</button>
          <button class="week-btn" onclick="filterByWeek('Semana 1', this)">📅 Sem 1: Psicotécnico/TAF (9)</button>
          <button class="week-btn" onclick="filterByWeek('Semana 2', this)">📅 Sem 2: Preterição (9)</button>
          <button class="week-btn" onclick="filterByWeek('Semana 3', this)">📅 Sem 3: Retroativos (9)</button>
          <button class="week-btn" onclick="filterByWeek('Semana 4', this)">📅 Sem 4: Erros em Prova (9)</button>
        </div>

A reprovação em exames psicológicos e testes de aptidão física (TAF) representa, hoje, uma das maiores causas de indignação e injustiça nos concursos públicos em todo o país. Depois de investir anos de preparação, abdicar de finais de semana e superar concorrências na casa de milhares de candidatos nas provas objetivas e discursivas, dezenas de milhares de candidatos são sumariamente eliminados por avaliações psicológicas obscuras ou por rigores físicos aplicados de forma arbitrária pela banca examinadora.

Neste artigo definitivo, vamos detalhar exatamente quais são os limites legais do exame psicotécnico, o papel fundamental da Súmula Vinculante nº 44 do STF, os abusos mais comuns no TAF e como funciona a ação judicial com pedido de liminar para recolocar você no Curso de Formação junto com a sua turma original.

## 1. Por que o Exame Psicotécnico é o que Mais Elimina Injustamente nos Concursos?

O exame psicotécnico possui, em tese, uma finalidade legítima: aferir se o candidato possui estabilidade emocional e traços de personalidade compatíveis com o exercício de funções de alta pressão, como carreiras policiais, judiciárias, fiscais e de auditoria.

Entretanto, na prática, muitas bancas examinadoras transformam essa etapa em um verdadeiro "filtro de conveniência" ou em uma caixa-preta sem transparência. É comum nos depararmos com laudos que utilizam termos vagos como "inadequação de controle dos impulsos" ou "nível de ansiedade ligeiramente superior à média", sem qualquer demonstração técnica de como isso impediria o candidato de exercer o cargo.

A falta de objetividade transforma o teste psicológico em um julgamento puramente subjetivo do avaliador contratado pela banca, violando o princípio básico do concurso público: a **impessoalidade** e a **igualdade de condições** entre todos os concorrentes.

---

## 2. O que diz a Súmula Vinculante nº 44 do Supremo Tribunal Federal (STF)?

Para conter a onda de arbitrariedades cometidas pelas comissões organizadoras, o Supremo Tribunal Federal editou a **Súmula Vinculante nº 44**, que possui força de lei sobre toda a Administração Pública (federal, estadual e municipal) e sobre todas as bancas do país. O texto determina:

> *"Só por lei se pode sujeitar a exame psicotécnico a habilitação de candidato a cargo público."*

A partir dessa súmula e da pacificação da jurisprudência nos tribunais superiores (STF e STJ), consolidou-se que a validade de qualquer reprovação em psicotécnico depende do cumprimento rigoroso e cumulativo de **três requisitos essenciais**:

### 2.1. Previsão Expressa na Lei da Carreira (e não apenas no Edital)
Este é o primeiro grande erro das bancas. O edital do concurso **não é lei** em sentido formal; ele é apenas um ato administrativo. Para que o psicotécnico possa ser exigido de um candidato, a **Lei Orgânica ou o Estatuto da Carreira** aprovado pelo Poder Legislativo (Congresso Nacional, Assembleia Legislativa ou Câmara Municipal) deve prever expressamente a obrigatoriedade do exame para aquele cargo específico. Se a exigência estiver apenas no edital, a eliminação é **100% nula e ilegal**.

### 2.2. Critérios Objetivos, Científicos e Sem Sigilo
O teste aplicado precisa basear-se em métodos científicos reconhecidos pelo Conselho Federal de Psicologia (CFP) e possuir parâmetros claros de pontuação fixados previamente no edital. A banca está rigorosamente proibida de realizar avaliações secretas, entrevistas de "perfil oculto" ou utilizar critérios de aferição que não possam ser auditados e reproduzidos posteriormente por outros profissionais em uma perícia judicial.

### 2.3. Direito de Acesso Integral ao Laudo e Recurso Administrativo
Todo candidato reprovado tem o direito inalienável de receber a **cópia integral e detalhada do seu laudo psicológico, dos testes aplicados e das folhas de resposta**, além de ter garantido um prazo razoável para a contratação de um psicólogo assistente técnico que formule o seu recurso administrativo. Quando a banca nega a cópia do laudo ou apresenta respostas genéricas ("recurso indeferido por manutenção do parecer inicial"), ela viola o direito ao contraditório e à ampla defesa, tornando o ato de eliminação passível de anulação judicial imediata.

## 3. Reprovação no TAF (Teste de Aptidão Física): Quais Abusos Podem Ser Anulados pelo Juiz?

Assim como no psicotécnico, o Teste de Aptidão Física (TAF) frequentemente é palco de graves ilegalidades administrativas. Embora o Judiciário não substitua o cronômetro ou a contagem do fiscal, os juízes anulam eliminações sempre que há **quebra das regras do edital ou violação à isonomia**. Os três maiores motivos de reversão judicial no TAF são:

* **Mudança nas regras de contagem durante a execução:** É extremamente frequente o fiscal de prova invalidar repetições na barra fixa, flexão ou abdominal exigindo uma inclinação, ângulo ou pausa que **não estavam descritos expressamente no edital**. Se o edital não exigiu extensão total do cotovelo com travamento de 2 segundos, o fiscal não pode exigir isso na hora da prova. A gravação em vídeo oficial ou feita por familiares é a principal prova para desmascarar esse abuso.
* **Condições climáticas extremas e falta de igualdade entre turmas:** A banca tem o dever de garantir condições equivalentes para todos os concorrentes. Aplicar a corrida de 2.400 metros para uma turma às 07h00 da manhã sob temperatura amena de 20°C, e obrigar outra turma a correr às 14h00 sob calor desumano de 38°C ou tempestade torrencial sem estrutura de pista adequada viola frontalmente o princípio da isonomia e da razoabilidade.
* **Direito de remarcação para candidatas gestantes (Tema 973 do STF):** O Supremo Tribunal Federal já pacificou em repercussão geral que a candidata gestante tem direito subjetivo à **remarcação do TAF para data posterior ao parto**, independentemente de haver previsão expressa no edital. Qualquer eliminação de candidata grávida por não comparecer ou não realizar o teste físico é inconstitucional.

## 4. Como Funciona a Ação Judicial com Pedido de Liminar para o Curso de Formação?

Quando o recurso administrativo é rejeitado pela banca, a ferramenta correta e eficaz para proteger o candidato é o ajuizamento de uma **Ação Judicial (Rito Ordinário ou Mandado de Segurança) com Pedido de Tutela de Urgência (Liminar)**.

A liminar é uma ordem judicial provisória emitida pelo juiz logo no início do processo, antes mesmo da sentença final. Para que o juiz conceda essa ordem, demonstrar dois elementos técnicos:
1. **A probabilidade do direito (*Fumus Boni Iuris*):** Provamos documentalmente que a banca descumpriu a Súmula 44, violou o edital ou cometeu erro arbitrário na avaliação;
2. **O perigo da demora (*Periculum in Mora*):** Demonstramos que o Curso de Formação ou a posse definitiva está para começar, e se o candidato não for reintegrado imediatamente, sofrerá prejuízo irreparável em sua carreira.

Ao deferir a liminar, o juiz determina que a banca examinadora e o Estado **reintegrem o candidato imediatamente ao certame**, garantindo a sua matrícula, frequência e avaliação no Curso de Formação junto com a sua turma original, bem como a reserva da sua vaga até o julgamento final da ação.

## 5. Qual é o Prazo Máximo para Entrar com Ação Judicial após a Reprovação?

O fator tempo é crítico no direito autoral de concursos. Existem dois prazos principais que todo candidato deve dominar:
* **Para Mandado de Segurança:** O prazo decadencial é de exatamente **120 dias corridos** contados a partir da publicação do ato ilegal no Diário Oficial (ou seja, da publicação da lista definitiva de eliminados após o recurso administrativo).
* **Para Ação Ordinária:** O prazo prescricional geral contra a Fazenda Pública é de **5 anos** (Prescrição Quinquenal). No entanto, em termos práticos e estratégicos, esperar meses ou anos para ingressar com a ação reduz drasticamente a chance de concessão de liminar, pois o concurso pode expirar ou as vagas podem ser totalmente preenchidas e homologadas.

**A regra de ouro do nosso escritório é clara:** quanto antes você ingressar judicialmente, maior é a probabilidade de garantir a sua matrícula no Curso de Formação sem atrasos na sua carreira.

## 1. O que é Preterição em Concurso Público segundo a Lei e o STF?

O termo "preterição" significa preterir, deixar de lado, passar na frente ou desprezar. No Direito Administrativo, a preterição ocorre sempre que a Administração Pública (seja um Ministério, uma Secretaria Estadual, Tribunal, Prefeitura ou Autarquia) ignora a ordem de classificação do concurso ou preenche cargos vagos de forma precária e ilegal enquanto existem candidatos aprovados devidamente habilitados aguardando convocação.

O artigo 37, incisos II e IV, da Constituição Federal estabelece que a investidura em cargo ou emprego público depende de aprovação prévia em concurso público, e que durante o prazo improrrogável previsto no edital, o aprovado será convocado com prioridade sobre novos concursados.

Quando o gestor público decide contratar temporários sem concurso para exercer atividades rotineiras da carreira, ou quando pula o candidato classificado em 15º lugar para convocar o 16º, ele comete um desvio de finalidade e atenta contra o princípio constitucional da moralidade administrativa.

## 2. Entendendo o Tema 784 de Repercussão Geral do Supremo Tribunal Federal

Para acabar com a insegurança jurídica sobre quando o cadastro de reserva tem ou não direito a exigir a convocação, o Plenário do Supremo Tribunal Federal julgou o célebre **Tema 784 da Repercussão Geral (RE 837.311/PI)**, fixando a seguinte tese vinculante para todos os juízes e tribunais do Brasil:

O surgimento de novas vagas ou a abertura de novo concurso para o mesmo cargo, durante o prazo de validade do certame anterior, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas originais, **RANGENDO-SE ESSE DIREITO (ou seja, garantindo a posse obrigatória) nas seguintes hipóteses excepcionais:**

1. **Quando a aprovação ocorrer dentro do número de vagas previsto no edital:** O candidato tem direito líquido e certo à posse dentro do prazo de validade;
2. **Quando houver preterição na convocação por inobservância da ordem de classificação:** Chamar candidatos posicionados atrás de você sem justificativa;
3. **Quando surgirem novas vagas, ou for aberto novo concurso durante a validade do certame anterior, E ocorrer preterição de forma arbitrária e imotivada por parte da Administração:** Contratação de temporários, terceirizados ou comissionados demonstrando a necessidade inequívoca de pessoal.

## 3. As 3 Formas Mais Comuns de Preterição que Garantem a Sua Nomeação

Vamos analisar em detalhes como ocorrem na prática as três situações que transformam o seu cadastro de reserva em posse judicial obrigatória:

### 3.1. Quebra da Ordem Classificatória (Preterição Direta)
É a forma mais clássica e agressiva de ilegalidade. Acontece quando o órgão publica portaria de convocação chamando candidatos com classificação inferior à sua sem que você tenha sido convocado previamente, sem que tenha assinado termo formal de desistência ou sem que tenha sido desclassificado por ato devidamente notificado. A **Súmula 15 do STF** é taxativa ao garantir o direito do preterido nesses casos.

### 3.2. Contratação de Temporários, Terceirizados ou Comissionados (Preterição Indireta)
Esta é a ilegalidade mais frequente no Brasil moderno. O órgão abre concurso para Cadastro de Reserva de "Analista", "Auditor", "Enfermeiro" ou "Professor". Meses depois, em vez de convocar os aprovados que estudaram e passaram, o órgão abre um Processo Seletivo Simplificado (PSS) para contratar temporários, ou contrata uma empresa terceirizada para alocar funcionários fazendo rigorosamente as mesmas funções técnicas.

Para a Justiça, a contratação de temporário durante a vigência do concurso **prova duas coisas fundamentais**:
* Que existe **vaga em aberto** ou necessidade permanente do serviço naquela localidade;
* Que existe **orçamento disponível** para pagar aquele profissional.

Logo, se há necessidade de trabalho e há dinheiro em caixa, o Estado tem a obrigação constitucional de convocar o candidato aprovado em concurso público, e não manter contratos precários por indicações políticas.

### 3.3. Abertura de Novo Concurso com Certame Anterior Ainda Vigente
Se a Administração lança um novo edital para o mesmo cargo enquanto o concurso em que você foi aprovado ainda está no seu prazo de validade (ou não prorrogou sem justificativa), e existem aprovados aguardando na fila, ocorre preterição arbitrária. Os aprovados do concurso anterior têm prioridade absoluta sobre qualquer nomeação do novo certame.

## 4. Como Recolher Provas no Portal da Transparência para Fundamentar a Ação Judicial?

Muitos candidatos perguntam ao nosso escritório: *"Doutor, como eu provo pro juiz que o órgão está contratando temporário na minha vaga?"* A resposta está na produção da **prova documental em três camadas**:

1. **Consulta ao Portal da Transparência do Órgão:** Acessamos o portal de recursos humanos do Estado/Município e levantamos a relação completa de servidores ativos naquele cargo, identificando quantos estão classificados com vínculo "Temporário", "Comissionado" ou "PSS".
2. **Quadro de Vagas da Carreira (Vacâncias):** Solicitamos via Lei de Acesso à Informação (ou extraímos dos diários oficiais) a lista atualizada de cargos vagos decorrentes de aposentadorias, demissões, exonerações ou falecimentos ocorridos após a homologação do seu concurso.
3. **Comparação de Atribuições:** Anexamos o edital do Processo Seletivo Temporário ao lado do edital do seu concurso para demonstrar ao magistrado que as tarefas descritas para o temporário são idênticas às atribuições legais do cargo para o qual você foi aprovado.

Com esse dossiê probatório robusto em mãos, a probabilidade de concessão de liminar para determinar a nomeação imediata aumenta exponencialmente.

## 5. Qual a Diferença entre Mandado de Segurança e Ação Ordinária nos Casos de Preterição?

A escolha da via processual correta é uma das decisões estratégicas mais importantes do advogado especialista em concursos:

* **Mandado de Segurança (MS):** É uma ação célere, que não admite produção de provas periciais ou testemunhais no decorrer do processo. Exige **prova pré-constituída** (ou seja, todo o dossiê de temporários, diários oficiais e classificação já deve estar 100% comprovado e anexado na petição inicial). O prazo para entrar com MS é de **120 dias** contados da ciência do ato ilegal (ex: data em que o temporário foi contratado no diário oficial ou data de expiração do concurso).
* **Ação Ordinária com Pedido de Tutela Antecipada (Liminar):** É a via mais ampla e segura quando o prazo de 120 dias do Mandado de Segurança já transcorreu, ou quando precisamos que o juiz determine a notificação do órgão para exibir documentos de vacância que o candidato não conseguiu obter sozinho. O prazo prescricional da Ação Ordinária é de **5 anos** contra a Fazenda Pública.

## 6. O Concurso Venceu: Ainda Posso Entrar na Justiça para Garantir a Minha Vaga?

**SIM!** A expiração do prazo de validade do concurso (seja o prazo inicial de 2 anos ou o prorrogado por mais 2) não apaga o crime administrativo se a preterição ou a contratação ilegal de temporários **ocorreu enquanto o concurso ainda estava válido**.

Segundo a jurisprudência consolidada do Superior Tribunal de Justiça (STJ) e do STF, se o candidato demonstra que durante o período de vigência do edital o Estado manteve temporários em número suficiente para alcançar a sua colocação na lista de aprovados, o direito de ação permanece intacto dentro do prazo prescricional de 5 anos contados a partir da data de encerramento do concurso.

Contudo, para evitar disputas processuais prolongadas e garantir que você assuma o cargo o quanto antes, nossa orientação firme é que a ação seja distribuída **preferencialmente antes do término do prazo de validade**, ou imediatamente nas semanas seguintes ao vencimento.

## 1. O que é a Indenização por Atraso na Nomeação e Posse em Concurso Público?

A indenização por atraso na posse (ou cobrança de verbas retroativas) é uma ação cível reparatória movida contra a Fazenda Pública (Estado, União ou Município). Seu objetivo é recompor o patrimônio do servidor público que foi ilegalmente impedido de assumir as suas funções na data em que a sua turma original foi convocada e empossada.

Pense na seguinte cronologia real:
* **Janeiro de 2022:** A turma de 100 aprovados do concurso é convocada para tomar posse. Você, classificado em 40º lugar, é cortado no psicotécnico de forma ilegal.
* **Fevereiro de 2022:** Você entra com ação judicial pedindo a anulação da reprovação.
* **Janeiro de 2025:** O processo transita em julgado com vitória integral. O juiz declara a eliminação nula e você toma posse definitiva.

Durante esses **36 meses exatos de atraso**, os seus colegas de turma receberam salários, progrediram na carreira, tiraram férias e receberam 13º. A ação de cobrança de retroativos visa condenar o Estado a pagar exatamente essa quantia financeira em dinheiro, como forma de reparar o erro administrativo que privou você de sua renda alimentar.

## 2. A Regra Geral do STF (Tema 671) e as Exceções que Garantem o Pagamento Retroativo

Para compreender como vencer essa ação com máxima segurança, precisamos dominar o que o Supremo Tribunal Federal decidiu no **Tema 671 de Repercussão Geral (RE 724.347/DF)**. Na ocasião, o STF fixou a tese geral de que:

> *"Na hipótese de posse em cargo público determinada por decisão judicial, o servidor não faz jus a indenização, sob o fundamento de que deveria ter sido investido em momento anterior, salvo situação de arbitrariedade flagrante."*

Ou seja, a regra geral para atrasos processuais comuns em que há dúvida jurídica razoável é de que não há pagamento retroativo se não houve trabalho efetivamente prestado. **NO ENTANTO, A PARTE FINAL DA TESE É A NOSSA CHAVE DE OURO: *"SALVO SITUAÇÃO DE ARBITRAREIDADE FLAGRANTE".***

Os tribunais de todo o Brasil (STJ, Tribunais de Justiça Estaduais e TRFs) aplicam essa exceção diariamente para condenar o Estado a pagar 100% dos retroativos em **três cenários clássicos de ilegalidade manifesta**:

### 2.1. Arbitrariedade Flagrante e Erro Grosseiro da Banca Examinadora
Quando a eliminação original do candidato não se deu por uma simples interpretação complexa do edital, mas sim por um **abuso frontal contra a lei ou contra súmula do STF**. Exemplos:
* Reprovação em psicotécnico em carreira onde a lei não previa o exame (violação da Súmula 44);
* Negativa de entrega da cópia do laudo ao candidato na fase administrativa;
* Eliminação em TAF por aplicação de regras de contagem de repetições não previstas no edital;
* Erro matemático grosseiro na soma das notas da prova discursiva ou objetiva.

Quando o juiz reconhece que a banca agiu com ilegalidade patente, arbitrária e inescusável, nasce o dever de indenizar todos os meses perdidos.

### 2.2. Preterição Comprovada pela Contratação de Temporários ou Quebra de Ordem
Se o motivo que levou você à Justiça e atrasou a sua posse foi o fato de o órgão **ter contratado temporários, terceirizados ou comissionados para exercer a sua função**, ou ter pulado a sua colocação na lista de convocação, o direito ao pagamento retroativo é **pacífico e indiscutível no Superior Tribunal de Justiça (STJ)**.

Nesse caso, a preterição é considerada o grau máximo de arbitrariedade administrativa. Se o Estado pagou salários para um temporário ilegal ocupar a sua cadeira durante 3 anos, o Estado tem a obrigação jurídica de pagar essa mesma quantia para você, que era o titular legítimo da vaga por mérito de aprovação.

### 2.3. Descumprimento de Ordem Liminar pelo Ente Público
Se durante o seu processo original o juiz concedeu uma liminar ordenando a sua matrícula imediata no Curso de Formação ou a sua posse provisória em 15 dias, e o Governador, Prefeito ou Secretário **descumpriu a ordem judicial ou atrasou meses para cumprir por pura recalcitrância**, todo o período de atraso decorrente desse descumprimento gera indenização retroativa automática e juros pesados contra a Fazenda Pública.

## 3. O que Entra no Cálculo da Indenização Retroativa?

Quando a ação de cobrança é julgada procedente perante a Vara da Fazenda Pública, o montante da indenização não se limita apenas ao salário base seco. A condenação patrimonial engloba a totalidade da remuneração e vantagens da carreira:

* **Salários Base Mensais + Gratificações de Atividade:** Multiplicação da remuneração bruta mensal da classe inicial do cargo pelo número exato de meses compreendidos entre a posse da turma original e a sua posse efetiva.
* **13º Salário Integral e Proporcional:** Contagem de todos os abonos natalinos que foram perdidos no período.
* **Férias Acrescidas do Terço Constitucional (1/3):** Indenização pecuniária de todos os períodos aquisitivos de férias que o servidor teria desfrutado se estivesse trabalhando desde o primeiro dia da convocação.
* **Correção Monetária e Juros de Mora:** Todos os valores mensais são corrigidos desde a data em que cada salário deveria ter sido depositado na sua conta, utilizando os índices oficiais (SELIC / IPCA-E), além de juros moratórios contra a Fazenda Pública.
* **Reflexos no Tempo de Serviço e Antiguidade:** Além do dinheiro, a decisão judicial determina a averbação de todo o período de atraso na ficha funcional do servidor para fins de **antiguidade na carreira, progressão funcional de letras/classes e contagem para aposentadoria** no regime próprio.

## 4. Existe Risco de Perseguição Funcional ao Cobrar Verbas Retroativas no Estágio Probatório?

Esta é, sem dúvida, a maior dúvida e o maior obstáculo psicológico que impede servidores públicos recém-empossados de buscarem centenas de milhares de reais que lhes pertencem por direito. A pergunta recorrente é: *"Doutor, se eu processar o Estado pedindo meus retroativos agora que estou no Estágio Probatório, meu chefe ou a corregedoria vão me perseguir e me demitir?"*

A resposta jurídica e prática é taxativa: **NÃO EXISTE ESSE RISCO, E A SUA ESTABILIDADE ESTÁ BLINDADA POR LEI.**

Por três motivos fundamentais:
1. **Pessoa Jurídica vs. Chefe Imediato:** A ação de indenização por posse atrasada corre na Justiça Cível (Vara da Fazenda Pública) contra a pessoa jurídica do Estado (ex: Estado de São Paulo, União Federal, Município). O seu chefe imediato, o delegado titular, o diretor da escola ou o secretário do órgão **sequer são citados ou participam do processo**. Eles muitas vezes nem tomam conhecimento da ação patrimonial que corre na Procuradoria Geral do Estado.
2. **Critérios Objetivos de Avaliação:** A avaliação de desempenho no Estágio Probatório é regida por critérios estritamente objetivos estabelecidos em lei (assiduidade, pontualidade, disciplina, capacidade de iniciativa e produtividade). Qualquer tentativa de nota baixa motivada pelo exercício regular do direito de ação constitucional é desvio de finalidade e crime de abuso de autoridade, prontamente anulado pela Justiça.
3. **Direito Constitucional de Petição:** O artigo 5º, inciso XXXV, da Constituição Federal garante que nenhuma lesão ou ameaça a direito será excluída da apreciação do Poder Judiciário. Exercer o seu direito de cobrar uma dívida do Estado é um ato de cidadania e de dignidade profissional.

## 5. Qual é o Prazo Prescricional para Entrar com a Ação de Indenização?

O direito de cobrar os salários retroativos não dura para sempre. Por se tratar de dívida contra a Fazenda Pública, aplica-se o prazo da **Prescrição Quinquenal (Decreto nº 20.910/1932)**.

O servidor público possui exatamente **5 (cinco) anos** para ingressar com a ação cível de cobrança. **Atenção ao termo inicial:** a contagem desses 5 anos começa a correr a partir da **data do trânsito em julgado (ou da posse definitiva)** do processo principal anterior onde foi declarada a nulidade da eliminação ou a preterição.

Se o prazo de 5 anos transcorrer sem o ajuizamento da demanda, o direito patrimonial prescreve e o dinheiro fica definitivamente nos cofres do Estado.

Diante desse cenário, o candidato protocola o recurso administrativo com esperança, fundamentando cada ponto técnica e bibliograficamente. E qual é a resposta da comissão organizadora? Um indeferimento padronizado de uma linha: *"Recurso indeferido. Mantido o gabarito/nota por seus próprios fundamentos"*.

Muitos desistem nesse momento por acreditarem no mito de que "a Justiça nunca se intromete em correção de prova de concurso". **Esse mito é falso.**

Embora o Poder Judiciário realmente não atue como uma "segunda banca examinadora" para discutir opiniões doutrinárias, o **Supremo Tribunal Federal (STF)** fixou diretrizes claras sobre quando o juiz tem a **obrigação de intervir para anular questões ilegais ou corrigir erros materiais grosseiros na correção discursiva.**

Neste artigo definitivo, vamos desmistificar o Tema 485 do STF, explicar as hipóteses exatas em que você pode recuperar pontos na Justiça, mostrar a diferença entre anulação para todos vs. anulação individual e ensinar como montar o dossiê pericial perfeito de sua prova.

## 1. O Poder Judiciário Pode Anular Questões de Concurso Público?

**SIM, PODE.** A Constituição Federal estabelece em seu artigo 5º, inciso XXXV, o princípio da inafastabilidade do controle jurisdicional: nenhuma lesão ou ameaça a direito pode ser excluída da apreciação do Judiciário.

No entanto, em matéria de concursos públicos, a intervenção do juiz não se dá por "discordância de gabarito". O magistrado é um operador do Direito, e não um professor de Física Quântica, Medicina, Informática ou Engenharia Nuclear. Por essa razão, a atuação judicial em provas é balizada por uma linha divisória rigorosa: **a separação entre o MÉRITO ADMINISTRATIVO e a LEGALIDADE DO ATO.**

* **O que o juiz NÃO PODE fazer (Mérito):** O juiz não pode substituir a banca para reavaliar se a resposta "A" é mais adequada que a "B" em uma questão com divergência doutrinária razoável, nem reavaliar se a sua redação merecia nota 8,0 ou 8,5 no critério de estilo de escrita.
* **O que o juiz DEVE fazer (Legalidade):** O juiz tem o poder e o dever de anular a questão quando a banca **violou as regras do próprio edital** (cobrando assunto não previsto) ou quando cometeu **erro teratológico e grosseiro** (ausência de resposta certa, duplicidade de gabarito ou desconsideração de resposta discursiva que bate palavra por palavra com o espelho).

## 2. Entendendo o Tema 485 da Repercussão Geral do STF: O Limite entre o Mérito e a Legalidade

Para padronizar os julgamentos em todo o país, o Plenário do Supremo Tribunal Federal julgou o **Tema 485 de Repercussão Geral (RE 632.853/CE)**, fixando a seguinte tese que rege 100% das ações judiciais sobre provas no Brasil:

> *"Não compete ao Poder Judiciário, no controle de legalidade, substituir banca examinadora para avaliar as respostas dadas pelos candidatos e as notas a elas atribuídas, **salvo excepcional juízo de compatibilidade do conteúdo das questões com o edital do certame**."*

Observe com atenção a exceção consagrada pelo Supremo: ***"SALVO EXCEPCIONAL JUÍZO DE COMPATIBILIDADE DO CONTEÚDO DAS QUESTÕES COM O EDITAL DO CERTAME"***.

Isso significa que sempre que conseguirmos demonstrar ao juiz de forma objetiva e visual que o conteúdo cobrado no enunciado da questão objetiva ou na proposta da redação extravasou as fronteiras do conteúdo programático publicado no edital, a anulação judicial não é um favor do juiz — é uma imposição de cumprimento obrigatório da tese do STF.

## 3. Questões Objetivas: As 2 Hipóteses Clássicas de Anulação Judicial

Na prática forense dos tribunais federais e estaduais, existem duas situações consolidadas que levam à decretação liminar ou definitiva da nulidade de questões de múltipla escolha ou Certo/Errado:

### 3.1. Cobrança de Conteúdo Programático Não Previsto no Edital (Matéria Estranha)
O edital é a lei interna do concurso e vincula estritamente tanto o candidato quanto a instituição organizadora. Se o anexo de conteúdos programáticos de "Direito Administrativo" exigiu apenas *Licitações (Lei 14.133/21)* e *Atos Administrativos*, e a banca formula uma questão exigindo o conhecimento sobre *Parcerias Público-Privadas (Lei 11.079/04)* ou *Improbidade Administrativa*, essa questão é **ilegal por vício de competência e excesso de exigência**.

O nosso trabalho técnico nesse caso consiste em elaborar um **Quadro Comparativo Pericial**: na coluna da esquerda transcrevemos o enunciado da questão cobrada; na coluna da direita transcrevemos o rol taxativo de matérias do edital, demonstrando matematicamente ao juiz que aquele tema nunca constou na lista oficial de estudos do candidato.

### 3.2. Erro Material Grosseiro, Duplicidade ou Ausência de Alternativa Correta
Além da matéria estranha ao edital, a jurisprudência do Superior Tribunal de Justiça (STJ) admite a intervenção judicial quando a questão apresenta um erro técnico tão absurdo e evidente que pode ser percebido de plano sem necessidade de debate científico aprofundado (o chamado "erro teratológico"). Exemplos:
* Questão de matemática onde nenhuma das 5 opções (A, B, C, D, E) contém o resultado real do cálculo;
* Enunciado que contém duas alternativas rigorosamente idênticas e corretas;
* Cobrança de lei que já estava revogada há anos antes da publicação do edital, induzindo o candidato ao erro irrecuperável.

## 4. Provas Discursivas e Peças Práticas: Como Provar Erro na Correção da Banca Examinadora?

A correção de provas discursivas, redações e peças prático-profissionais (como em concursos jurídicos, fiscais ou de engenharia) é onde ocorrem as maiores injustiças por negligência das bancas. Com milhões de textos para corrigir em prazos curtos, corretores terceirizados frequentemente deixam de ler parágrafos inteiros das folhas de resposta.

O Tema 485 do STF também protege o candidato na prova discursiva quando ocorre o **Erro Material de Correção ou Contradição com o Espelho Oficial**.

Para reverter pontos na discursiva na Justiça, não podemos argumentar que "a redação está bem escrita". Nós utilizamos o método da **Confrontação Analítica Lado a Lado**:
1. **Pegamos o Espelho Oficial de Correção da Banca:** Identificamos o item (ex: *"Quesito 2.1: O candidato explicou o conceito de responsabilidade civil objetiva do Estado com base no art. 37, §6º da CF — Vale 1,50 ponto"*).
2. **Pegamos a Cópia Digitalizada da sua Folha de Resposta:** Localizamos exatamente em qual linha e parágrafo você escreveu a resposta (ex: *"Linhas 14 a 18 da folha 2: Conforme disposto no art. 37, §6º da CF, a responsabilidade civil do Estado é objetiva..."*).
3. **Demonstramos o Erro do Corretor:** Provamos para o magistrado que você escreveu literalmente o que a banca pediu no espelho, mas a grade de pontuação lhe atribuiu nota "0,00" ou "0,50" por puro equívoco ou desatenção do avaliador.

Quando provamos esse erro material factual (e não de opinião), o juiz determina a retificação da nota e a soma dos pontos roubados à sua média final.

## 5. Se o Juiz Anular a Questão, os Pontos Vão Apenas para Quem Entrou com a Ação?

Esta é uma das questões processuais mais importantes para o candidato que está em dúvida se vale a pena ingressar judicialmente:

Quando uma questão é anulada na via administrativa (pela própria banca), a pontuação é distribuída para todos os candidatos do concurso. **NO ENTANTO, QUANDO A ANULAÇÃO OCORRE NA VIA JUDICIAL (em Mandado de Segurança ou Ação Ordinária individual), O PONTO DA QUESTÃO ANULADA É ATRIBUÍDO EXCLUSIVAMENTE AO CANDIDATO QUE ENTROU COM A AÇÃO.**

O juiz de um processo individual não tem competência para anular a questão para todo o Brasil ou para recalcular a nota de milhares de concorrentes que não fazem parte do processo. A decisão judicial produz efeitos apenas *inter partes* (entre o candidato autor da ação e o órgão público).

Isso significa que, se você errou uma questão ilegal fora do edital, entrar na Justiça garante que **apenas a sua nota suba**, proporcionando um salto gigantesco na sua classificação geral em relação aos concorrentes que permaneceram inertes.

## 6. Qual o Momento Processual Adequado para Entrar com Mandado de Segurança ou Ação Ordinária?

O momento exato do ajuizamento é fundamental para não perder as etapas seguintes do certame:

* **Após o Resultado do Recurso Administrativo:** Você deve obrigatoriamente interpor o recurso na via administrativa no prazo do edital. Assim que a banca publicar o indeferimento e divulgar a nota definitiva ou a lista de convocação para a próxima fase (ex: TAF ou Prova Oral), nasce o interesse de agir para a ação judicial.
* **Ação com Pedido Liminar Urgente:** Se você ficou fora da nota de corte para a próxima etapa por causa daquela questão ilegal, a ação judicial deve ser interposta **imediatamente, no prazo de dias ou semanas após o resultado definitivo**, acompanhada de pedido liminar urgente para que o juiz ordene a soma cautelar dos pontos e garanta a sua participação na etapa seguinte junto com os demais aprovados.
* **Prazo do Mandado de Segurança:** Máximo de 120 dias corridos contados da publicação da nota definitiva que indeferiu o seu recurso administrativo.

    /* =========================================================================
       CALENDAR RENDERER (JULY & AUGUST 2026)
       ========================================================================= */
    let currentMonthView = 'julho'; // 'julho' or 'agosto'

    const MONTHS_CONFIG = {
      julho: {
        title: "Julho 2026",
        year: 2026,
        monthIndex: 6, // 0-based (6 = July)
        daysInMonth: 31,
        firstDayOfWeek: 3, // Wednesday (Jul 1, 2026 is Wed -> index 3)
        prevMonthDays: 30 // June has 30 days
      },
      agosto: {
        title: "Agosto 2026",
        year: 2026,
        monthIndex: 7, // 0-based (7 = August)
        daysInMonth: 31,
        firstDayOfWeek: 6, // Saturday (Aug 1, 2026 is Sat -> index 6)
        prevMonthDays: 31 // July has 31 days
      }
    };

    function changeMonth(monthKey) {
      currentMonthView = monthKey;
      document.getElementById('current-month-label').innerText = MONTHS_CONFIG[monthKey].title;
      document.getElementById('btn-julho').classList.toggle('active', monthKey === 'julho');
      document.getElementById('btn-agosto').classList.toggle('active', monthKey === 'agosto');
      renderCalendar();
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid-cells');
      grid.innerHTML = '';
      const config = MONTHS_CONFIG[currentMonthView];

      // 1. Previous month filler days
      for (let i = config.firstDayOfWeek - 1; i >= 0; i--) {
        const dayNum = config.prevMonthDays - i;
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = `<span class="day-number">${dayNum}</span>`;
        grid.appendChild(cell);
      }

      // 2. Current month days
      for (let day = 1; day <= config.daysInMonth; day++) {
        const dateStr = `2026-${String(config.monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        
        // Highlight launch weekend or key start
        if (dateStr === '2026-07-18' || dateStr === '2026-07-19') {
          cell.classList.add('today');
        }

        cell.innerHTML = `<span class="day-number">${day}</span>`;

        // Find events for this day
        const dayEvents = CONTENTS.filter(item => item.date === dateStr);
        dayEvents.forEach(ev => {
          const pill = document.createElement('div');
          pill.className = `event-pill ${ev.platform}`;
          pill.title = ev.title;
          
          let icon = '📱';
          if (ev.platform === 'yt') icon = '📺';
          if (ev.platform === 'linkedin') icon = '👔';
          if (ev.platform === 'blog') icon = '🌐';
          if (ev.id.includes('fixo')) icon = '📌';

          pill.innerHTML = `<span>${icon}</span> <span>${ev.platformLabel.split(' ')[1] || ev.platformLabel}</span> ${ev.graphicUrl ? '<span style="color: var(--amber); font-weight: bold; margin-left: 3px;" title="Arte Pronta Sincronizada">🎨</span>' : ''}`;
          pill.onclick = (e) => {
            e.stopPropagation();
            openDrawer(ev.id);
          };
          cell.appendChild(pill);
        });

        grid.appendChild(cell);
      }

      // 3. Next month filler days to complete 42-cell grid (6 rows) or 35 cells (5 rows)
      const totalCellsFilled = config.firstDayOfWeek + config.daysInMonth;
      const targetGridCells = totalCellsFilled > 35 ? 42 : 35;
      const remainingCells = targetGridCells - totalCellsFilled;

      for (let i = 1; i <= remainingCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = `<span class="day-number">${i}</span>`;
        grid.appendChild(cell);
      }
    }

    function toggleAccordion(id) {

    function universalCopy(text, onSuccess) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          if (onSuccess) onSuccess();
        }).catch(err => {
          fallbackCopy(text, onSuccess);
        });
      } else {
        fallbackCopy(text, onSuccess);
      }
    }

    function fallbackCopy(text, onSuccess) {
      try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.top = '0';
        textarea.style.left = '0';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        const successful = document.execCommand('copy');
        document.body.removeChild(textarea);
        if (successful && onSuccess) {
          onSuccess();
        } else {
          alert("Por favor, selecione o texto do roteiro e pressione Ctrl+C / Cmd+C para copiar.");
        }
      } catch (err) {
        alert("Por favor, selecione o texto do roteiro e pressione Ctrl+C / Cmd+C para copiar.");
      }
    }

    function copyScript(event, id) {
      event.stopPropagation();

      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;

      universalCopy(fullText, () => {
        btn.innerHTML = `<span>✅</span> Copiado!`;
        btn.style.background = '#10B981';
        btn.style.borderColor = '#10B981';
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.style.background = '';
          btn.style.borderColor = '';
        }, 2000);
      });
    }
